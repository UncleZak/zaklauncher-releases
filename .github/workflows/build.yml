name: Build

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  actions: write
  checks: write
  contents: write
  deployments: write
  discussions: write
  issues: write
  packages: write
  pages: write
  pull-requests: write
  repository-projects: write
  security-events: write
  statuses: write
    
jobs:
  build:
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_NO_WARNINGS: 1
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Checkout GitLab repo
        run: git clone https://oauth2:${{ secrets.GH_ZL_TOKEN }}@gitlab.com/zaklauncher/launcher.git source

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 24

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Cache pnpm store
        uses: actions/cache@v3
        with:
          path: ~/.pnpm-store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('source/packages/client/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Cache client cache
        uses: actions/cache@v3
        with:
          path: source/packages/client/cache
          key: client-cache-${{ runner.os }}-${{ hashFiles('source/packages/client/pnpm-lock.yaml') }}
          restore-keys: |
            client-cache-${{ runner.os }}-

      - name: Install dependencies (without postinstall)
        run: |
          cd source
          pnpm install --ignore-scripts --store ~/.pnpm-store

      - name: Build client
        run: |
          cd source
          pnpm --filter ./packages/client build
        env:
          VITE_CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
          VITE_CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          VITE_CLOUDINARY_UPLOAD_PRESET: ${{ secrets.CLOUDINARY_UPLOAD_PRESET }}
          VITE_API_URL: ${{ secrets.API_URL }}
          VITE_CHAT_SERVICE_URL: ${{ secrets.CHAT_SERVICE_URL }}

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        if: runner.os != 'Windows'
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
    
      - name: Upload build to server (Linux/OSX)
        if: runner.os != 'Windows'
        run: |
          rsync -avz \
            --include="*/" \
            --include="*.zip" \
            --include="packages/*.nw" \
            --include="packages/version" \
            --exclude="*" \
            source/packages/client/bin/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/latest_tmp/
            
      - name: Upload build to server (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          rsync -avz -e "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" --include="*/" --include="*.zip" --include="packages/*.nw" --include="packages/version" --exclude="*" source/packages/client/bin/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/latest_tmp/

  deploy:
    needs: build
    runs-on: ubuntu-latest
  
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          
      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
          
      - name: Activate release
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            set -e
            cd /var/www
  
            rm -rf latest || true
            mv latest_tmp latest || true
          EOF
