name: Build

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  actions: write
  checks: write
  contents: write
  deployments: write
  discussions: write
  issues: write
  packages: write
  pages: write
  pull-requests: write
  repository-projects: write
  security-events: write
  statuses: write
    
jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Checkout GitLab repo
        run: |
          git clone https://oauth2:${{ secrets.GH_ZL_TOKEN }}@gitlab.com/zaklauncher/launcher.git source
          cd source

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22
          
      - uses: pnpm/action-setup@v2
        with:
          version: 9
        
      - name: Install dependencies (without postinstall)
        run: |
          cd source
          pnpm install --ignore-scripts

      - name: Build client
        run: |
          cd source
          pnpm --filter ./packages/client build
        env:
          VITE_CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
          VITE_CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          VITE_CLOUDINARY_UPLOAD_PRESET: ${{ secrets.CLOUDINARY_UPLOAD_PRESET }}
          VITE_API_URL: ${{ secrets.API_URL }}
          VITE_CHAT_SERVICE_URL: ${{ secrets.CHAT_SERVICE_URL }}
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}    
      - name: Upload build to server
        run: |
          rsync -avz \
            --include="*/" \
            --include="*.zip" \
            --include="packages/*.nw" \
            --include="packages/version" \
            --exclude="*" \
            source/packages/client/bin/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/latest_tmp/
          
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            source/packages/client/bin/*.zip
            source/packages/client/bin/packages/*.nw
            source/packages/client/bin/packages/version
  deploy:
    needs: build
    runs-on: ubuntu-latest
  
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
  
      - name: Activate release
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            set -e
            cd /var/www
  
            rm -rf latest || true
            mv latest_tmp latest || true
          EOF
