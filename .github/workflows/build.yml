name: Build

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  actions: write
  checks: write
  contents: write
  deployments: write
  discussions: write
  issues: write
  packages: write
  pages: write
  pull-requests: write
  repository-projects: write
  security-events: write
  statuses: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_NO_WARNINGS: 1
    strategy:
      matrix:
        os: [windows-latest]
        # os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Checkout GitLab repo
        run: git clone https://oauth2:${{ secrets.GH_ZL_TOKEN }}@gitlab.com/zaklauncher/launcher.git source

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 24

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Cache pnpm store
        uses: actions/cache@v3
        with:
          path: ~/.pnpm-store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('source/packages/client/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Cache client cache
        uses: actions/cache@v3
        with:
          path: source/packages/client/cache
          key: client-cache-${{ runner.os }}-${{ hashFiles('source/packages/client/pnpm-lock.yaml') }}
          restore-keys: |
            client-cache-${{ runner.os }}-

      - name: Install dependencies (without postinstall)
        run: |
          cd source
          pnpm install --ignore-scripts --store ~/.pnpm-store
      - name: Install dependncies for package
        run: |
          cd source/packages/client/public
          npm install
      - name: Build client
        run: |
          cd source
          pnpm --filter ./packages/client build
        env:
          VITE_CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
          VITE_CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          VITE_CLOUDINARY_UPLOAD_PRESET: ${{ secrets.CLOUDINARY_UPLOAD_PRESET }}
          VITE_API_URL: ${{ secrets.API_URL }}
          VITE_CHAT_SERVICE_URL: ${{ secrets.CHAT_SERVICE_URL }}

      - name: Generate WiX manifests
        run: |
          cd source
          node ./packages/client/generate-wix-files.mjs

      - name: Ensure WiX Toolset
        shell: powershell
        run: |
          if (Get-Command candle.exe -ErrorAction SilentlyContinue) {
            Write-Host "WiX already available in PATH"
            exit 0
          }

          choco install wixtoolset -y --no-progress

      - name: Build MSI installer (WiX CLI)
        run: |
          cd source
          New-Item -ItemType Directory -Force -Path ./packages/client/bin/wix-ci | Out-Null
          $candle = (Get-Command candle.exe -ErrorAction Stop).Source
          $light = (Get-Command light.exe -ErrorAction Stop).Source
          & "$candle" -nologo -dSourceDir=packages/client/bin/win-x64 -out packages/client/bin/wix-ci/ packages/client/wix/product.wxs packages/client/wix/files.wxs
          & "$light" -nologo -ext WixUtilExtension -out packages/client/bin/ZakLauncher.msi packages/client/bin/wix-ci/product.wixobj packages/client/bin/wix-ci/files.wixobj

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            source/packages/client/bin/*.zip
            source/packages/client/bin/packages/*.nw
            source/packages/client/bin/packages/version

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: |
            source/packages/client/bin/*.msi

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        run: echo "Ready to deploy"

      # Скачать артефакты всех OS
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-windows-latest
          path: ./build/win

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: installer-windows-latest
          path: ./build/win

      # - name: Download Linux artifacts
      #   uses: actions/download-artifact@v4
      #   with:
      #     name: build-ubuntu-latest
      #     path: ./build/linux

      # - name: Download macOS artifacts
      #   uses: actions/download-artifact@v4
      #   with:
      #     name: build-macos-latest
      #     path: ./build/osx

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy all artifacts to server
        run: |
          rsync -avz ./build/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/latest_tmp/
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            set -e
            cd /var/www
            rm -rf latest || true
            mv latest_tmp latest || true
          EOF
