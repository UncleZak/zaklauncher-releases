name: Build

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  actions: write
  checks: write
  contents: write
  deployments: write
  discussions: write
  issues: write
  packages: write
  pages: write
  pull-requests: write
  repository-projects: write
  security-events: write
  statuses: write
    
jobs:
  build:
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_NO_WARNINGS: 1
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Checkout GitLab repo
        run: git clone https://oauth2:${{ secrets.GH_ZL_TOKEN }}@gitlab.com/zaklauncher/launcher.git source

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 24

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Cache pnpm store
        uses: actions/cache@v3
        with:
          path: ~/.pnpm-store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('source/packages/client/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Cache client cache
        uses: actions/cache@v3
        with:
          path: source/packages/client/cache
          key: client-cache-${{ runner.os }}-${{ hashFiles('source/packages/client/pnpm-lock.yaml') }}
          restore-keys: |
            client-cache-${{ runner.os }}-

      - name: Install dependencies (without postinstall)
        run: |
          cd source
          pnpm install --ignore-scripts --store ~/.pnpm-store

      - name: Build client
        run: |
          cd source
          pnpm --filter ./packages/client build
        env:
          VITE_CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
          VITE_CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          VITE_CLOUDINARY_UPLOAD_PRESET: ${{ secrets.CLOUDINARY_UPLOAD_PRESET }}
          VITE_API_URL: ${{ secrets.API_URL }}
          VITE_CHAT_SERVICE_URL: ${{ secrets.CHAT_SERVICE_URL }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            source/packages/client/bin/*.zip
            source/packages/client/bin/packages/*.nw
            source/packages/client/bin/packages/version
          
  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        run: echo "Ready to deploy"

      # Скачать артефакты всех OS
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-windows-latest
          path: ./build/windows

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-ubuntu-latest
          path: ./build/linux

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-macos-latest
          path: ./build/macos

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy all artifacts to server
        run: |
          rsync -avz ./build/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/latest_tmp/
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            set -e
            cd /var/www
            rm -rf latest || true
            mv latest_tmp latest || true
          EOF
